<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FayeFaye 🤞</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #F4E4A8;
    background-image: 
        radial-gradient(circle at 15% 10%, rgba(200,150,100,0.3) 2%, transparent 2%),
        radial-gradient(circle at 85% 20%, rgba(200,150,100,0.3) 2%, transparent 2%),
        radial-gradient(circle at 10% 40%, rgba(200,150,100,0.3) 1.5%, transparent 1.5%);
    min-height: 100vh;
    padding: 20px;
}

/* HEADER */
.container { max-width: 900px; margin: auto; }

header {
    text-align: center;
    color: #5B4B9E;
    padding: 40px 20px;
}

h1 { font-size: 3em; }

/* ENVELOPE */
.envelope-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
    perspective: 1200px;
}

.envelope {
    width: 320px;
    height: 200px;
    position: relative;
    cursor: pointer;
}

.flap {
    position: absolute;
    top: 0;
    width: 100%;
    height: 50%;
    background: #5B4B9E;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 3;
    border-radius: 10px 10px 0 0;
}

.body {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: white;
    border: 3px solid #C89664;
    border-radius: 10px;
    z-index: 1;
}

.letter {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    bottom: 20px;
    background: white;
    padding: 15px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.8s ease;
    font-size: 1em;
    line-height: 1.4;
    overflow: hidden;
    z-index: 2;
}

/* OPEN STATE */
.envelope.open .flap {
    transform: rotateX(-180deg);
}

.envelope.open .letter {
    opacity: 1;
    transform: translateY(0);
}

/* GALLERY (unchanged vibe) */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

/* IMAGE CARDS */
.image-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    border: 3px solid #C89664;
}

.image-container {
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* 🤞 PARTICLES */
.particle {
    position: fixed;
    font-size: 20px;
    animation: floatUp 2s linear forwards;
    pointer-events: none;
    z-index: 9999;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-150px); opacity: 0; }
}

/* TYPEWRITER */
#typed {
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>FayeFaye</h1>
    <p>Je t'adore, Faye 🤞</p>
</header>

<!-- ENVELOPE -->
<div class="envelope-wrapper">
    <div class="envelope" id="envelope" onclick="openLetter()">
        <div class="flap"></div>
        <div class="body"></div>

        <div class="letter">
            <div id="typed"></div>
        </div>
    </div>
</div>

<!-- GALLERY -->
<div class="gallery">

    <div class="image-card">
        <div class="image-container">
            <img src="https://i.imgur.com/XHEAB0V.png">
        </div>
    </div>

    <div class="image-card">
        <div class="image-container">
            <img src="https://i.imgur.com/xRno0Co.png">
        </div>
    </div>

    <div class="image-card">
        <div class="image-container">
            <img src="https://i.imgur.com/5YcY51d.png">
        </div>
    </div>

</div>

</div>

<script>

let opened = false;

const message =
`Faye, I adore you. Absolutely adorable. You’re fun to be around.
You truly carry me in Roblox and I carry you in Minecraft. 🤞`;

function openLetter() {
    if (opened) return;

    const password = prompt("Enter password to open the secret letter:");

    if (password !== "Maggi") {
        alert("Wrong password.");
        return;
    }

    opened = true;

    const envelope = document.getElementById("envelope");
    envelope.classList.add("open");

    typeWriter(message, document.getElementById("typed"));

    spawnParticles();
}

/* TYPEWRITER */
function typeWriter(text, element) {
    let i = 0;
    element.innerHTML = "";

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 25);
        }
    }

    typing();
}

/* 🤞 PARTICLES */
function spawnParticles() {
    for (let i = 0; i < 25; i++) {
        setTimeout(() => {
            const p = document.createElement("div");
            p.classList.add("particle");
            p.innerHTML = "🤞";

            p.style.left = Math.random() * window.innerWidth + "px";
            p.style.top = (window.innerHeight - 100) + "px";

            document.body.appendChild(p);

            setTimeout(() => p.remove(), 2000);
        }, i * 80);
    }
}

</script>

</body>
</html>
