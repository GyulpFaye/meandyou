<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>FayeFaye 🤞</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F4E4A8;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(200, 150, 100, 0.3) 2%, transparent 2%),
                radial-gradient(circle at 85% 20%, rgba(200, 150, 100, 0.3) 2%, transparent 2%),a
                radial-gradient(circle at 10% 40%, rgba(200, 150, 100, 0.3) 1.5%, transparent 1.5%),
                radial-gradient(circle at 90% 50%, rgba(200, 150, 100, 0.3) 1.8%, transparent 1.8%),
                radial-gradient(circle at 80% 80%, rgba(200, 150, 100, 0.3) 2.2%, transparent 2.2%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: #5B4B9E;
            margin-bottom: 25px;
            padding: 40px 20px;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1.3em;
            opacity: 0.85;
        }

        /* 🎵 MUSIC BUTTON */
        .music {
            text-align: center;
            margin-bottom: 20px;
        }

        .music button {
            background:#5B4B9E;
            color:white;
            border:none;
            padding:10px 16px;
            border-radius:12px;
            cursor:pointer;
            font-size:1em;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid #C89664;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .image-container {
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .caption {
            padding: 20px;
            text-align: center;
            font-size: 1.1em;
        }

        /* 🤞 particles */
        .particle {
            position: fixed;
            font-size: 20px;
            animation: floatUp 2s linear forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-150px); opacity: 0; }
        }

    </style>
</head>

<body>

<!-- YOUTUBE (hidden) -->
<div id="yt"></div>

<script>

let musicOn = false;
let opened = false;

/* 🎵 MUSIC */
function toggleMusic() {
    if (!musicOn) {
        const iframe = document.createElement("iframe");
        iframe.width = "0";
        iframe.height = "0";
        iframe.src = "https://www.youtube.com/embed/QcDEwcwmEbs?autoplay=1&loop=1&playlist=QcDEwcwmEbs";
        iframe.allow = "autoplay";
        document.getElementById("yt").appendChild(iframe);
        musicOn = true;
    } else {
        document.getElementById("yt").innerHTML = "";
        musicOn = false;
    }
}

/* 💌 LETTER */
const message =
`Faye, I adore you. Absolutely adorable. You’re fun to be around.
You truly carry me in Roblox and I carry you in Minecraft. 🤞`;

function openLetter() {
    const password = prompt("Enter password:");
    if (password !== "Maggi") return alert("Wrong password");

    if (opened) return;
    opened = true;

    document.getElementById("letterBox").style.display = "block";
    typeWriter(message, document.getElementById("typedText"));
    spawnParticles();
}

/* TYPEWRITER */
function typeWriter(text, el) {
    let i = 0;
    el.innerHTML = "";

    function run() {
        if (i < text.length) {
            el.innerHTML += text[i++];
            setTimeout(run, 25);
        }
    }
    run();
}

/* 🤞 PARTICLES */
function spawnParticles() {
    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            const p = document.createElement("div");
            p.className = "particle";
            p.innerHTML = "🤞";
            p.style.left = Math.random() * window.innerWidth + "px";
            p.style.top = (window.innerHeight - 100) + "px";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }, i * 80);
    }
}

</script>
